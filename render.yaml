services:
  - type: web
    name: attendiq-scraper
    runtime: python
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium --with-deps
    startCommand: gunicorn app:app --timeout 120 --workers 1
    envVars:
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/.cache/ms-playwright
